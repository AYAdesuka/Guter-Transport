{% extends 'html/base.html' %}

{% block title %}Неверный запрос — Guter Transport{% endblock %}

{% block content %}
<section class="error-section d-flex align-items-center justify-content-center py-5">
    <div class="container text-center py-5">
        <div class="error-code mb-3">400</div>
        <h1 class="fw-bold text-dark mb-3">Неверный запрос</h1>
        <p class="text-muted mb-4 mx-auto" style="max-width: 480px;">
            Сервер не смог обработать ваш запрос. Проверьте введённые данные и попробуйте снова.
        </p>
        <a href="{% url 'main:home' %}" class="btn btn-brand px-4 py-2 text-white fw-medium">На главную</a>
    </div>
</section>
{% endblock %}

{% block extra_css %}
<style>
    .error-section { min-height: 60vh; background: linear-gradient(180deg, #f3faf5 0%, #ffffff 100%); }
    .error-code { font-size: 7rem; font-weight: 800; line-height: 1; color: #6c757d; opacity: 0.2; }
    .btn-brand { background-color: #1ab248; border: none; border-radius: 8px; }
    .btn-brand:hover { background-color: #138535; color: #fff; }
</style>
{% endblock %}
